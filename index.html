<!DOCTYPE html>
<html>
<head>
    <title>Digital Notice Board</title>
	
    <style>
        body {
            margin: 0;
            background: black;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .notice {
            display: none;
            width: 100vw;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* -------- TEXT STYLE -------- */
        .text-notice {
            font-size: 4vw;
            text-align: center;
            padding: 40px;
            line-height: 1.5;
        }

        /* -------- MEDIA STYLE -------- */
        img, video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* -------- SLIDESHOW -------- */
        .slide {
            display: none;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>

<body>

<div id="default-message" style="display:none; width:100vw; height:100vh; display:flex; justify-content:center; align-items:center;">
    <h1 style="font-size:4vw; text-align:center;">
        Welcome to Electrical Engineering Department
    </h1>
</div>

{% for notice in notices %}
<div class="notice" data-duration="{{ notice[5] }}">

    {% if notice[3] == 'text' %}
        <div class="text-notice">
            {{ notice[2] }}
        </div>

    {% elif notice[3] == 'image' %}
        <img src="{{ notice[4] }}">

    {% elif notice[3] == 'video' %}		
		<video src="{{ notice[4] }}" autoplay muted loop></video>
		
    {% elif notice[3] == 'slideshow' %}
        {% for img in notice[7] %}
            <img class="slide" src="{{ img }}">
        {% endfor %}
    {% endif %}

</div>

{% endfor %}

<script>
let notices = document.querySelectorAll('.notice');
let index = 0;

function showNotice(i) {
	notices.forEach(n => {
		n.style.display = "none";

		let v = n.querySelector("video");
		if (v) {
			v.pause();
			v.currentTime = 0;
		}
	});
    let current = notices[i];
    current.style.display = "flex";
	
	let v = current.querySelector("video");
	if (v) {
		v.play();
	}
    let duration = (current.dataset.duration || 10) * 1000;

    /* -------- SLIDESHOW -------- */
    let slides = current.querySelectorAll('.slide');
    let slideInterval;

    if (slides.length > 0) {
        let s = 0;

        slides.forEach(img => img.style.display = "none");

        function showSlide() {
            slides.forEach(img => img.style.display = "none");
            slides[s].style.display = "block";
            s = (s + 1) % slides.length;
        }

        showSlide();
        slideInterval = setInterval(showSlide, 3000);
    }

    /* -------- NEXT NOTICE -------- */
    setTimeout(() => {
        if (slideInterval) clearInterval(slideInterval);

        index = (index + 1) % notices.length;
        showNotice(index);
    }, duration);
}

if (notices.length > 0) {
    showNotice(0);
} else {
    document.getElementById("default-message").style.display = "flex";
}
</script>
<script>
let currentVersion = null;

async function checkForUpdates() {
    try {
        let res = await fetch('/api/version');
        let data = await res.json();
		
		if (currentVersion === null) {
			currentVersion = data.version;
			return;
		}
		if (currentVersion !== data.version) {
			console.log("New notice detected!");
			location.reload();
		}		

    } catch (err) {
        console.error("Update check failed", err);
    }
}

// check every 10 seconds
setInterval(checkForUpdates, 10000);
</script>
</body>
</html>
